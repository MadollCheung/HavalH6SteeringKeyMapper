name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 JDK 17（AGP 8.x 要求 JDK 17+）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 生成 gradle-wrapper.jar
      #    仓库未提交二进制 jar，CI 用系统 Gradle 自动生成
      - name: Generate Gradle Wrapper JAR
        run: |
          # 安装与项目一致的 Gradle 8.2
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.2/bin/gradle wrapper \
            --gradle-version 8.2 \
            --distribution-type bin
          ls gradle/wrapper/

      # 4. 赋予 gradlew 执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 构建 Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 6. 上传 APK 为 Artifact（可在 Actions 页面直接下载）
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HavalH6SteeringKeyMapper-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

